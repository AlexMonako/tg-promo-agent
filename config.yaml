# tg-promo-agent production config for AlexMonako.
# Non-sensitive — safe to commit. Railway picks this up via Dockerfile COPY.

own_channels:
  - username: "ready_player_vr"
    topic: "Ready Player One — VR, metaverse, immersive tech"
    language: "ru"
    target_audience: "VR enthusiasts, metaverse and crypto-gaming audience, RU-speaking"
    goals: [grow_subscribers, increase_engagement]
    discussion_group: null
    can_post: true

  - username: "aiatrtools"
    topic: "AI art tools — video and image generation with neural networks"
    language: "ru"
    target_audience: "creators, designers, AI-art hobbyists, RU-speaking"
    goals: [grow_subscribers, increase_engagement]
    discussion_group: null
    can_post: true

  - username: "AliceTango"
    topic: "Alice — AI avatar / Tango live streaming content"
    language: "ru"
    target_audience: "Tango Live viewers and AI-avatar curious audience"
    goals: [grow_subscribers, increase_engagement]
    discussion_group: null
    can_post: true

policy:
  # Conservative caps for the first 3 days of live posting. Telegram's
  # antifraud is most jumpy when a previously-quiet user account suddenly
  # starts authoring 15 comments/day. After ~3 days of clean live activity
  # we can raise to: posts_per_day 3, comments_per_day 15.
  max_own_channel_posts_per_day: 2
  max_comments_per_day: 5
  max_dms_per_day: 0
  min_minutes_between_same_tool: 30
  min_minutes_between_same_foreign_channel: 360
  comment_blacklist_keywords:
    - "реклама"
    - "scam"
    - "#ad"
  forbidden_phrases_in_generated_content:
    - "гарантированный доход"
    - "click here now"
    - "100% profit"
  # DMs disabled until a curated DM-target whitelist is added (otherwise LLM may
  # hallucinate a random username like @meta_llama). Re-enable when ready.
  require_human_approval_for:
    - tg_dm_channel_owner

# Foreign channels the agent is allowed to comment under.
# Pruned 2026-05-08 after 24h dry-run: kept only the 3 channels that the
# planner actually used + that returned real posts via fetch_recent_messages.
# Removed (zero activity in 24h, likely no discussion group / wrong username
# / inactive): ai_newz, bogdanisssimo, nn_for_science, vrgeek, xrtoday_ru,
# vr_chat_ru. Re-add manually after verifying each is live + has comments
# enabled.
allowed_foreign_channels:
  - "denissexy"
  - "cgevent"
  - "neural"

cross_post:
  twitter:
    enabled: false
  reddit:
    enabled: false
    subreddits: []
  vk:
    enabled: false
    group_ids: []

similar_search:
  min_subscribers: 500
  max_subscribers: 50000
  languages: ["ru", "en"]
  dm_cooldown_days: 30
